name: Build Electron Display

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: electron-display
        run: npm install
      - name: Build Mac DMG (ARM64 + x64)
        working-directory: electron-display
        run: npx electron-builder --mac dmg --arm64 --x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-builds
          path: electron-display/dist/*.dmg
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: electron-display
        run: npm install
      # Windows runner can produce both NSIS portable .exe and ZIP. We force NSIS portable
      # here so users get a single-file installer like the Mac DMG; ZIP is for fallback /
      # local Mac cross-builds (NSIS portable can't be built reliably on macOS).
      - name: Build Windows portable
        working-directory: electron-display
        run: npx electron-builder --win portable --x64
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: |
            electron-display/dist/*.exe
            electron-display/dist/*.zip
          if-no-files-found: error

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Mac artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-builds
          path: dist
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-builds
          path: dist
      - name: Create / update Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
