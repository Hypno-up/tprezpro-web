<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Timer Display - Connexion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0c29 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: white;
    }
    .container { text-align: center; padding: 2rem; width: 380px; }
    h1 { font-size: 1.3rem; margin-bottom: 0.3rem; }
    .subtitle { color: rgba(255,255,255,0.5); font-size: 0.75rem; margin-bottom: 1.5rem; }
    .version { color: rgba(255,255,255,0.2); font-size: 0.6rem; margin-top: 1rem; }

    .section { margin-bottom: 1.2rem; }
    .section-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.4);
      margin-bottom: 0.5rem;
    }

    input {
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(139,92,246,0.3);
      color: white;
      padding: 0.65rem 0.8rem;
      border-radius: 8px;
      font-size: 1rem;
      text-align: center;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #8b5cf6; }
    input.code-input {
      font-family: monospace;
      font-size: 1.4rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    input.license-input {
      font-family: monospace;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    button {
      display: block;
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.6rem;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-green { background: #22c55e; }
    .btn-green:hover { background: #16a34a; }
    .btn-purple { background: #8b5cf6; }
    .btn-purple:hover { background: #7c3aed; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .status { margin-top: 0.5rem; font-size: 0.75rem; min-height: 1.2rem; }
    .status.ok { color: #4ade80; }
    .status.err { color: #f87171; }
    .status.info { color: #a78bfa; }

    .divider { border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 1rem 0; }
    .hidden { display: none; }

    .license-toggle {
      background: none;
      border: none;
      color: rgba(255,255,255,0.3);
      font-size: 0.7rem;
      cursor: pointer;
      padding: 0.3rem;
      margin: 0;
      width: auto;
      display: inline;
    }
    .license-toggle:hover { color: rgba(255,255,255,0.6); }

    .license-badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 20px;
      font-size: 0.65rem;
      font-weight: 700;
    }
    .badge-valid { background: rgba(34,197,94,0.2); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
  </style>
</head>
<body>
  <div class="container">
    <h1>Timer Display</h1>
    <p class="subtitle">Overlay transparent pour presentations</p>

    <!-- Room Code Section (FIRST - always accessible) -->
    <div class="section">
      <div class="section-title">Code de salle</div>
      <input id="code" class="code-input" type="text" maxlength="6" placeholder="CODE" autofocus>
      <button id="go" class="btn-green">Connecter</button>
      <div id="room-status" class="status"></div>
    </div>

    <hr class="divider">

    <!-- License Section (optional, collapsed by default) -->
    <div id="license-badge-area"></div>
    <button class="license-toggle" id="license-toggle">Licence (optionnel) ▾</button>
    <div id="license-panel" class="hidden" style="margin-top:0.5rem;">
      <div class="section">
        <input id="license-key" class="license-input" type="text" maxlength="14" placeholder="TPRO-XXXX-XXXX">
        <button id="activate-btn" class="btn-purple">Activer</button>
        <div id="license-status" class="status"></div>
      </div>
    </div>

    <p class="version">v1.5.0</p>
  </div>

  <script>
    var codeInput = document.getElementById('code');
    var goBtn = document.getElementById('go');
    var roomStatus = document.getElementById('room-status');
    var licenseKey = document.getElementById('license-key');
    var activateBtn = document.getElementById('activate-btn');
    var licenseStatus = document.getElementById('license-status');
    var licenseToggle = document.getElementById('license-toggle');
    var licensePanel = document.getElementById('license-panel');
    var licenseBadgeArea = document.getElementById('license-badge-area');

    // Auto uppercase
    codeInput.addEventListener('input', function() { codeInput.value = codeInput.value.toUpperCase(); });
    licenseKey.addEventListener('input', function() { licenseKey.value = licenseKey.value.toUpperCase(); });

    // Toggle license panel
    licenseToggle.addEventListener('click', function() {
      licensePanel.classList.toggle('hidden');
      licenseToggle.textContent = licensePanel.classList.contains('hidden')
        ? 'Licence (optionnel) ▾'
        : 'Licence (optionnel) ▴';
    });

    // Connect to room — NO license required
    function connect() {
      var code = codeInput.value.trim().toUpperCase();
      if (code.length < 4) {
        roomStatus.textContent = 'Code trop court (min 4 caracteres)';
        roomStatus.className = 'status err';
        return;
      }
      if (window.electronAPI) {
        goBtn.disabled = true;
        goBtn.textContent = 'Connexion...';
        window.electronAPI.setRoomCode(code);
      } else {
        window.location.href = '/room/' + code;
      }
    }

    goBtn.addEventListener('click', connect);
    codeInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') connect(); });

    // Check existing license on load
    async function checkExistingLicense() {
      if (!window.electronAPI) return;
      try {
        var status = await window.electronAPI.getLicenseStatus();
        if (status.valid) {
          showLicenseValid(status);
        }
      } catch(e) {}
    }

    function showLicenseValid(data) {
      var label = data.plan === 'multi' ? '3 jours' : '1 jour';
      licenseBadgeArea.innerHTML = '<span class="license-badge badge-valid">Licence active (' + label + ')</span>';
      licenseToggle.style.display = 'none';
      licensePanel.classList.add('hidden');
    }

    // Activate license
    activateBtn.addEventListener('click', async function() {
      var key = licenseKey.value.trim().toUpperCase();
      if (!key) return;

      activateBtn.disabled = true;
      activateBtn.textContent = '...';
      licenseStatus.textContent = '';

      try {
        var result;
        if (window.electronAPI) {
          result = await window.electronAPI.submitLicense(key);
        } else {
          var resp = await fetch('https://tprezpro-web.netlify.app/.netlify/functions/validate-license', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ licenseKey: key, machineId: 'web-' + Date.now() })
          });
          result = await resp.json();
        }

        if (result.valid) {
          licenseStatus.textContent = 'Licence activee !';
          licenseStatus.className = 'status ok';
          showLicenseValid(result.data);
        } else {
          licenseStatus.textContent = result.error || 'Cle invalide';
          licenseStatus.className = 'status err';
        }
      } catch(e) {
        licenseStatus.textContent = 'Erreur: ' + e.message;
        licenseStatus.className = 'status err';
      }

      activateBtn.disabled = false;
      activateBtn.textContent = 'Activer';
    });

    checkExistingLicense();
  </script>
</body>
</html>
