<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timer Display</title>
  <!-- Firebase compat (works with file:// and regular script tags) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: transparent;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-app-region: drag;
    }

    .timer-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .timer-container.hidden-state {
      opacity: 0;
      transform: scale(0.8);
    }

    .timer-text {
      font-weight: 900;
      letter-spacing: 0.05em;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 30px rgba(102, 126, 234, 0.5));
      transition: font-size 0.3s ease;
    }

    .timer-text.solid-color {
      -webkit-text-fill-color: currentColor;
      background: none;
    }

    .size-text-4xl { font-size: 3rem; }
    .size-text-6xl { font-size: 5rem; }
    .size-text-8xl { font-size: 8rem; }
    .size-text-9xl { font-size: 12rem; }

    .message-text {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      max-width: 90vw;
      text-align: center;
      word-wrap: break-word;
      transition: opacity 0.3s ease;
    }

    .message-above { order: -1; margin-bottom: 1rem; }
    .message-below { order: 1; margin-top: 1rem; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .blinking { animation: blink 1s ease-in-out infinite; }

    .connecting {
      color: rgba(255,255,255,0.4);
      font-size: 1rem;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <div id="timer-container" class="timer-container">
    <div id="message-text" class="message-text message-below" style="opacity:0;"></div>
    <div id="timer-text" class="timer-text size-text-6xl">
      <span class="connecting">Connexion...</span>
    </div>
  </div>

  <script>
    // Get room code from URL
    var params = new URLSearchParams(window.location.search);
    var roomCode = params.get('room');
    if (!roomCode) {
      document.body.innerHTML = '<div style="color:white;text-align:center;padding:2rem;"><h1>Pas de code de salle</h1></div>';
      throw new Error('No room code');
    }

    // Init Firebase (compat mode)
    var firebaseConfig = {
      apiKey: "AIzaSyCnV7heF2vU2tA7uOTrf4tEamVW73yUp1o",
      authDomain: "tprezpro-web.firebaseapp.com",
      databaseURL: "https://tprezpro-web-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "tprezpro-web",
      storageBucket: "tprezpro-web.firebasestorage.app",
      messagingSenderId: "190667786733",
      appId: "1:190667786733:web:dcd2a2d52855ca63cc7fe4"
    };

    try {
      firebase.initializeApp(firebaseConfig);
    } catch (e) {
      document.getElementById('timer-text').innerHTML =
        '<span class="connecting" style="color:#f87171;font-size:0.8rem;">Firebase init failed: ' + (e && e.message ? e.message : e) + '</span>';
      throw e;
    }
    if (typeof firebase === 'undefined' || !firebase.database) {
      document.getElementById('timer-text').innerHTML =
        '<span class="connecting" style="color:#f87171;font-size:0.8rem;">Firebase SDK not loaded (check internet / gstatic.com blocked)</span>';
      throw new Error('Firebase SDK missing');
    }
    var db = firebase.database();

    var timerContainer = document.getElementById('timer-container');
    var timerText = document.getElementById('timer-text');
    var messageText = document.getElementById('message-text');

    var sizeMap = {
      'text-4xl': 'size-text-4xl',
      'text-6xl': 'size-text-6xl',
      'text-8xl': 'size-text-8xl',
      'text-9xl': 'size-text-9xl'
    };

    var prevLocked = true;
    var connected = false;
    var currentState = null;
    var localInterval = null;

    // Compute the displayed value. Mode-aware:
    //   countdown: returns remaining (floored at 0)
    //   countup:   returns elapsed (no cap — grows past totalTime), reads `chronoBase`
    //              (Firebase keeps `timeLeft` at 999999 as a legacy-engine guard).
    function computeTimeLeft(state) {
      if (!state) return 0;
      if (state.mode === 'countup') {
        var base = state.chronoBase != null ? state.chronoBase : 0;
        if (!state.isRunning) return base;
        var now = Date.now();
        var elapsed = Math.floor((now - (state.lastTick || now)) / 1000);
        return base + (elapsed < 0 ? 0 : elapsed);
      }
      if (!state.isRunning) return state.timeLeft || 0;
      var now2 = Date.now();
      var base2 = state.startedTimeLeft != null ? state.startedTimeLeft : (state.timeLeft || 0);
      var elapsed2 = Math.floor((now2 - (state.lastTick || now2)) / 1000);
      return Math.max(0, base2 - elapsed2);
    }

    function isOverflowState(state) {
      if (!state || state.mode !== 'countup') return false;
      var total = state.totalTime || 0;
      var elapsed = computeTimeLeft(state);
      return total > 0 && elapsed >= total;
    }

    function renderTime(timeLeft, state) {
      var s = state || currentState || {};
      var total = s.totalTime || 0;
      var overflow = s.mode === 'countup' && total > 0 && timeLeft >= total;
      var displayed = overflow ? (timeLeft - total) : timeLeft;
      var min = Math.floor(displayed / 60);
      var sec = displayed % 60;
      timerText.textContent = (overflow ? '+' : '') +
        String(min).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
    }

    function startLocalCountdown() {
      stopLocalCountdown();
      localInterval = setInterval(function() {
        if (!currentState || !currentState.isRunning) {
          stopLocalCountdown();
          return;
        }
        var tl = computeTimeLeft(currentState);
        currentState.timeLeft = tl;
        renderTime(tl, currentState);

        var total = currentState.totalTime || 0;
        var isCountup = currentState.mode === 'countup';
        var remaining = isCountup ? (total - tl) : tl;
        var overflow = isCountup && total > 0 && tl >= total;

        // Blink in last 30s OR while overflowing in countup
        if (overflow || (remaining > 0 && remaining <= 30)) {
          timerText.classList.add('blinking');
        } else {
          timerText.classList.remove('blinking');
        }

        // Countdown auto-stops at 0; countup keeps going
        if (!isCountup && tl === 0) {
          currentState.isRunning = false;
          timerText.classList.remove('blinking');
          stopLocalCountdown();
        }
      }, 500);
    }

    function stopLocalCountdown() {
      if (localInterval) {
        clearInterval(localInterval);
        localInterval = null;
      }
    }

    // Connection state with timeout (v1.8.1 — surfaces network/Firebase issues)
    var connectionAttempts = 0;
    setTimeout(function() {
      if (!connected) {
        timerText.innerHTML = '<span class="connecting" style="font-size:0.8rem;">Pas de reponse Firebase (10s) — verifiez pare-feu Windows / proxy</span>';
      }
    }, 10000);

    // Listen to state
    db.ref('rooms/' + roomCode + '/state').on('value', function(snapshot) {
      var state = snapshot.val();
      if (!state) {
        timerText.innerHTML = '<span class="connecting">Salle introuvable: ' + roomCode + '</span>';
        return;
      }

      var wasRunning = currentState ? currentState.isRunning : false;
      var nowRunning = !!state.isRunning;
      currentState = state;
      connected = true;

      // Time display — computeTimeLeft is mode-aware (countup → chronoBase + elapsed)
      var tl = computeTimeLeft(state);
      state.timeLeft = tl;
      renderTime(tl, state);
      if (nowRunning) {
        if (!localInterval) startLocalCountdown();
      } else {
        stopLocalCountdown();
      }

      var overflow = isOverflowState(state);

      // Visibility
      timerContainer.classList.toggle('hidden-state', !state.isVisible);

      // Color — overflow in countup forces red (unless user set a colour)
      if (overflow && !state.color) {
        timerText.classList.add('solid-color');
        timerText.style.color = '#ef4444';
        timerText.style.filter = 'drop-shadow(0 0 30px rgba(239, 68, 68, 0.7))';
      } else if (state.color) {
        timerText.classList.add('solid-color');
        timerText.style.color = state.color;
        timerText.style.filter = 'drop-shadow(0 0 30px ' + state.color + '80)';
      } else {
        timerText.classList.remove('solid-color');
        timerText.style.color = '';
        timerText.style.filter = 'drop-shadow(0 0 30px rgba(102, 126, 234, 0.5))';
      }

      // Size
      timerText.className = 'timer-text ' + (sizeMap[state.size] || 'size-text-6xl');
      if (state.color || overflow) timerText.classList.add('solid-color');

      // Transparency - use Electron API for real window transparency
      if (window.electronAPI) {
        window.electronAPI.setOpacity((state.transparency || 100) / 100);
      }

      // Blinking — mode-aware (countup: last 30s before target + permanent past target)
      var total = state.totalTime || 0;
      var isCountup = state.mode === 'countup';
      var tlNow = state.timeLeft || 0;
      var remaining = isCountup ? (total - tlNow) : tlNow;
      var nearLimit = (remaining >= 0 && remaining <= 30);
      if (state.isBlinking || overflow || (state.isRunning && total > 0 && nearLimit)) {
        timerText.classList.add('blinking');
      } else {
        timerText.classList.remove('blinking');
      }

      // Lock/unlock - toggle mouse events via Electron
      if (window.electronAPI && state.isLocked !== prevLocked) {
        window.electronAPI.setMouseEvents(state.isLocked);
        prevLocked = state.isLocked;
        document.body.style.webkitAppRegion = state.isLocked ? 'no-drag' : 'drag';
      }

      // Message
      if (state.message && state.message.trim()) {
        messageText.textContent = state.message;
        messageText.style.opacity = '1';
        messageText.className = 'message-text ' +
          (state.messagePosition === 'above' ? 'message-above' : 'message-below');
      } else {
        messageText.style.opacity = '0';
      }
    }, function(err) {
      timerText.innerHTML = '<span class="connecting" style="color:#f87171;font-size:0.8rem;">Lecture salle refusee: ' + err.message + '</span>';
    });

    // Connection error handling — surface error from .on second arg + drop count
    var dropCount = 0;
    db.ref('.info/connected').on('value', function(snap) {
      if (snap.val()) {
        // connected — only clear the message if we haven't received room data yet
        if (!connected) {
          timerText.innerHTML = '<span class="connecting">Connecte, attente donnees salle...</span>';
        }
      } else {
        dropCount++;
        if (!connected) {
          timerText.innerHTML = '<span class="connecting">Connexion Firebase (tentative ' + dropCount + ')...</span>';
        }
      }
    }, function(err) {
      timerText.innerHTML = '<span class="connecting" style="color:#f87171;font-size:0.8rem;">.info/connected error: ' + err.message + '</span>';
    });
  </script>
</body>
</html>
