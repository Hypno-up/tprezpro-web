<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Timer Display - Room Code</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0c29 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: white;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: 1.3rem;
      margin-bottom: 0.5rem;
    }
    p {
      color: rgba(255,255,255,0.6);
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
    }
    input {
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(139,92,246,0.4);
      color: white;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 1.5rem;
      font-family: monospace;
      text-align: center;
      letter-spacing: 0.2em;
      width: 220px;
      outline: none;
      text-transform: uppercase;
    }
    input:focus { border-color: #8b5cf6; }
    button {
      display: block;
      margin: 1rem auto 0;
      padding: 0.6rem 2rem;
      background: #8b5cf6;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #7c3aed; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Timer Display</h1>
    <p>Entrez le code de salle du BackOffice</p>
    <input id="code" type="text" maxlength="6" placeholder="CODE" autofocus>
    <button id="go">Connecter</button>
  </div>
  <script>
    const input = document.getElementById('code');
    const btn = document.getElementById('go');
    input.addEventListener('input', () => { input.value = input.value.toUpperCase(); });
    function connect() {
      const code = input.value.trim().toUpperCase();
      if (code.length >= 4 && window.electronAPI) {
        window.electronAPI.setRoomCode(code);
      }
    }
    btn.addEventListener('click', connect);
    input.addEventListener('keypress', (e) => { if (e.key === 'Enter') connect(); });
  </script>
</body>
</html>
